<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beauty Bot 💄</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffdde1, #ee9ca7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 350px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #ff6f91;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat-box {
            height: 400px;
            padding: 10px;
            overflow-y: auto;
        }

        .user, .bot {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user {
            background: #ffb6c1;
            align-self: flex-end;
            margin-left: auto;
        }

        .bot {
            background: #f1f1f1;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            background: #ff6f91;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }

        button:hover {
            background: #ff3e6c;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">💄 Beauty Bot</div>

    <div class="chat-box" id="chatBox">
        <div class="bot">Hi! I am your Beauty Bot 💕 Ask me about skincare, makeup, or tips!</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();
    if (message === "") return;

    let chatBox = document.getElementById("chatBox");

    // User message
    let userMsg = document.createElement("div");
    userMsg.className = "user";
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    // Bot response
    let botMsg = document.createElement("div");
    botMsg.className = "bot";
    botMsg.innerText = getBotReply(message);
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";
}

function getBotReply(message) {
    message = message.toLowerCase();

    if (message.includes("hello") || message.includes("hi")) {
        return "Hello beautiful! 💖 How can I help you?";
    }
    else if (message.includes("skin")) {
        return "For glowing skin ✨: Drink water, use sunscreen, and cleanse daily!";
    }
    else if (message.includes("acne")) {
        return "Avoid oily products and use gentle facewash for acne 😊";
    }
    else if (message.includes("makeup")) {
        return "Use primer, foundation, and finish with setting spray 💄";
    }
    else if (message.includes("hair")) {
        return "Oil your hair weekly and avoid heat styling 🔥";
    }
    else {
        return "I'm still learning 💕 Ask me about skincare, makeup, or hair care!";
    }
}
</script>

</body>
</html>
